; PlatformIO configuration for Fluex nRF52840 firmware
; Target: Adafruit Feather nRF52840 Express

[env:adafruit_feather_nrf52840]
platform    = nordicnrf52
board       = adafruit_feather_nrf52840
framework   = arduino

build_flags =
    -DARDUINO_ARCH_NRF52
    -DNRF52840_XXAA
    -DARDUINO_FEATHER52840
    -O2

lib_deps =
    ; BLE / SoftDevice managed by nRF SDK
    Wire
    SPI
    sparkfun/SparkFun ICM 42688-P @ ^1.0.2
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2
    tensorflow/TensorFlowLite_ESP32 @ ^0.0.1    ; replace with nRF TFLite Micro
    bblanchon/ArduinoJson @ ^7.0.4

monitor_speed = 115200
upload_speed  = 1000000

[env:debug]
extends     = env:adafruit_feather_nrf52840
build_type  = debug
build_flags =
    ${env:adafruit_feather_nrf52840.build_flags}
    -DFLUEX_DEBUG=1
